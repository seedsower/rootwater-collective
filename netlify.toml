[build]
  publish = "."
  command = "echo 'No build step required - static site'"

[[redirects]]
  from = "/music"
  to = "/pages/music.html"
  status = 200

[[redirects]]
  from = "/merch"
  to = "/pages/merch.html"
  status = 200

[[redirects]]
  from = "/story"
  to = "/pages/story.html"
  status = 200

[[redirects]]
  from = "/connect"
  to = "/pages/connect.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[dev]
  command = "python3 -m http.server 8000"
  targetPort = 8000
  publish = "."
  autoLaunch = true
